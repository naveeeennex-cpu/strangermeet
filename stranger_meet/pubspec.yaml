name: stranger_meet
description: StrangerMeet - Social meetup app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.0.0
  flutter_secure_storage: ^9.0.0
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  timeago: ^3.6.1
  cupertino_icons: ^1.0.6
  web_socket_channel: ^2.4.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  video_player: ^2.11.1
  chewie: ^1.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
